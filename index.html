<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>復習マスター Pro</title>
<meta name="theme-color" content="#f7f8fc">
<style>
:root{
  --bg:#f7f8fc;
  --card:#ffffff;
  --text:#111827;
  --sub:#6b7280;
  --line:#e5e7eb;
  --accent:#2563eb;
  --green:#16a34a;
  --red:#ef4444;
  --orange:#f59e0b;
  --shadow:0 10px 30px rgba(15,23,42,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  background:linear-gradient(180deg,#ffffff 0%,var(--bg) 260px);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;overflow:hidden}
.top{
  padding:22px 18px 8px;
  position:sticky;top:0;z-index:5;
  background:rgba(247,248,252,.86);
  backdrop-filter:blur(18px);
}
.title{font-size:26px;font-weight:900;letter-spacing:-.04em;margin:0}
.subtitle{color:var(--sub);font-size:13px;margin-top:4px}
.pages{display:flex;width:400%;transition:transform .38s cubic-bezier(.22,1,.36,1)}
.page{width:25%;padding:12px 18px 106px;min-height:calc(100vh - 70px)}
.card{
  background:var(--card);
  border-radius:26px;
  padding:18px;
  box-shadow:var(--shadow);
  margin-bottom:14px;
  border:1px solid rgba(229,231,235,.7);
}
.hero-card{background:linear-gradient(135deg,#2563eb,#60a5fa);color:#fff}
.hero-num{font-size:48px;font-weight:900;line-height:1;margin:8px 0}
.hero-label{opacity:.92;font-size:14px}
.row{display:flex;gap:10px;align-items:center;justify-content:space-between}
input{
  width:100%;padding:15px 16px;border-radius:17px;border:2px solid var(--line);
  font-size:16px;margin:7px 0 10px;background:#fff;outline:none;
}
input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(37,99,235,.12)}
.btn{
  border:none;border-radius:17px;padding:14px 16px;font-size:15px;font-weight:800;cursor:pointer;
  transition:transform .12s ease,opacity .2s ease;
}
.btn:active{transform:scale(.97)}
.primary{background:var(--accent);color:#fff;width:100%}
.done{background:var(--green);color:#fff;width:100%;margin-top:12px}
.danger{background:#fee2e2;color:#b91c1c;margin-top:12px;width:100%}
.ghost{background:#f3f4f6;color:#374151}
.item-title{font-size:19px;font-weight:900;margin:4px 0 8px;letter-spacing:-.02em}
.meta{color:var(--sub);font-size:13px;line-height:1.8}
.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:800}
.empty{text-align:center;color:var(--sub);padding:32px 16px;line-height:1.7}
.nav{
  position:fixed;left:50%;bottom:0;transform:translateX(-50%);
  width:100%;max-width:520px;background:rgba(255,255,255,.92);backdrop-filter:blur(18px);
  border-top:1px solid var(--line);display:flex;padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:10;
}
.nav button{flex:1;border:none;background:none;color:#6b7280;padding:7px 4px;border-radius:16px;position:relative;font-weight:800}
.nav .icon{display:block;font-size:22px;line-height:1.1;transition:.22s}
.nav .label{font-size:11px;display:block;margin-top:3px}
.nav button.active{color:var(--accent);background:#eff6ff}
.nav button.active .icon{transform:translateY(-2px) scale(1.08)}
.count-dot{position:absolute;top:3px;right:22%;background:var(--red);color:#fff;border-radius:99px;font-size:10px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-box{background:#fff;border-radius:22px;padding:16px;box-shadow:var(--shadow);border:1px solid rgba(229,231,235,.7)}
.stat-num{font-size:32px;font-weight:900;line-height:1.1}.stat-label{font-size:12px;color:var(--sub);margin-top:6px}
.section-title{font-size:18px;font-weight:900;margin:10px 2px 12px}
.progress{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-top:10px}.bar{height:100%;background:var(--accent);border-radius:99px}
.small-note{font-size:12px;color:var(--sub);margin-top:8px;line-height:1.6}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <h1 class="title">復習マスター Pro</h1>
    <div class="subtitle">忘れる前に、ちょうどよく再出現。</div>
  </div>

  <div class="pages" id="pages">
    <section class="page" id="home">
      <div class="card hero-card">
        <div class="hero-label">今日の復習</div>
        <div class="hero-num" id="todayCount">0</div>
        <div class="hero-label">完了すると次の復習日に自動で移動します</div>
      </div>
      <div class="section-title">今日やる問題</div>
      <div id="todayList"></div>
    </section>

    <section class="page" id="add">
      <div class="card">
        <h2 style="margin:0 0 12px">問題を登録</h2>
        <div class="meta">タイトルと問題番号だけ入力すればOKです。</div>
        <input id="newTitle" placeholder="タイトル 例：宅建 権利関係">
        <input id="newNumber" placeholder="問題番号 例：001 / 第1問">
        <button class="btn primary" onclick="addItem()">登録する</button>
        <div class="small-note">登録した問題はホームに表示され、完了すると 1日後 → 2日後 → 5日後 → 1週間後 → 2週間後 → 1カ月後 → 2カ月後 → 以後1カ月毎 に再出現します。</div>
      </div>
    </section>

    <section class="page" id="list">
      <div class="section-title">全問題一覧</div>
      <div id="allList"></div>
    </section>

    <section class="page" id="stats">
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-num" id="totalNum">0</div><div class="stat-label">総問題数</div></div>
        <div class="stat-box"><div class="stat-num" id="dueNum">0</div><div class="stat-label">今日の復習</div></div>
        <div class="stat-box"><div class="stat-num" id="doneNum">0</div><div class="stat-label">累計完了</div></div>
        <div class="stat-box"><div class="stat-num" id="avgLevel">0</div><div class="stat-label">平均段階</div></div>
      </div>
      <div class="card" style="margin-top:14px">
        <h3 style="margin:0 0 8px">スケジュール</h3>
        <div class="meta">1日後 → 2日後 → 5日後 → 7日後 → 14日後 → 30日後 → 60日後 → 以後30日毎</div>
      </div>
      <button onclick="exportData()">データを書き出し</button>

<input type="file" id="importFile" accept=".json" onchange="importData(event)">
    </section>
  </div>

  <div class="nav">
    <button class="active" onclick="go(0)"><span class="icon">🏠</span><span class="label">ホーム</span><span class="count-dot" id="navDot" style="display:none">0</span></button>
    <button onclick="go(1)"><span class="icon">➕</span><span class="label">追加</span></button>
    <button onclick="go(2)"><span class="icon">📚</span><span class="label">一覧</span></button>
    <button onclick="go(3)"><span class="icon">📊</span><span class="label">統計</span></button>
  </div>
</div>

<script>
const intervals=[1,2,5,7,14,30,60];
let items=JSON.parse(localStorage.getItem('review_master_pro')||'[]');
let currentPage=0,startX=0,startY=0;

function save(){localStorage.setItem('review_master_pro',JSON.stringify(items));}
function todayStr(){const d=new Date();d.setHours(0,0,0,0);return d.toISOString().split('T')[0];}
function addDays(days){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+days);return d.toISOString().split('T')[0];}
function formatDate(s){return s.replaceAll('-','/');}
function dueItems(){const t=todayStr();return items.map((item,index)=>({item,index})).filter(x=>x.item.nextReview<=t);}

function addItem(){
  const title=document.getElementById('newTitle').value.trim();
  const number=document.getElementById('newNumber').value.trim();
  if(!title||!number){alert('タイトルと問題番号を入力してください');return;}
  items.push({title,number,level:0,nextReview:todayStr(),created:todayStr(),done:0});
  save();
  document.getElementById('newTitle').value='';
  document.getElementById('newNumber').value='';
  renderAll();renderToday();renderStats();go(0);
}

function completeReview(index){
  const item=items[index];
  const add=item.level<intervals.length?intervals[item.level]:30;
  item.nextReview=addDays(add);
  item.level++;
  item.done=(item.done||0)+1;
  save();renderToday();renderAll();renderStats();
}

function deleteItem(index){
  if(!confirm('この問題を削除しますか？'))return;
  items.splice(index,1);
  save();renderToday();renderAll();renderStats();
}

function renderToday(){
  const box=document.getElementById('todayList');
  const due=dueItems();
  document.getElementById('todayCount').textContent=due.length;
  document.getElementById('navDot').style.display=due.length?'flex':'none';
  document.getElementById('navDot').textContent=due.length;
  box.innerHTML='';
  if(!due.length){box.innerHTML='<div class="card empty">今日の復習はありません 🎉<br>新しい問題を追加するか、次回復習日を待ちましょう。</div>';return;}
  due.forEach(({item,index})=>{
    box.innerHTML+=`<div class="card">
      <span class="badge">第${item.level+1}段階</span>
      <div class="item-title">${escapeHtml(item.title)}</div>
      <div class="meta">問題番号：${escapeHtml(item.number)}<br>今回の復習日：${formatDate(item.nextReview)}<br>完了回数：${item.done||0}回</div>
      <button class="btn done" onclick="completeReview(${index})">完了</button>
    </div>`;
  });
}

function renderAll(){
  const box=document.getElementById('allList');
  box.innerHTML='';
  if(!items.length){box.innerHTML='<div class="card empty">まだ問題が登録されていません。</div>';return;}
  items.forEach((item,index)=>{
    const isDue=item.nextReview<=todayStr();
    box.innerHTML+=`<div class="card">
      <span class="badge" style="background:${isDue?'#fee2e2':'#eff6ff'};color:${isDue?'#b91c1c':'#1d4ed8'}">${isDue?'今日復習':'予約中'}</span>
      <div class="item-title">${escapeHtml(item.title)}</div>
      <div class="meta">問題番号：${escapeHtml(item.number)}<br>次回復習：${formatDate(item.nextReview)}<br>段階：${item.level} / 完了：${item.done||0}回</div>
      <button class="btn danger" onclick="deleteItem(${index})">削除</button>
    </div>`;
  });
}

function renderStats(){
  const due=dueItems().length;
  const done=items.reduce((s,x)=>s+(x.done||0),0);
  const avg=items.length?Math.round(items.reduce((s,x)=>s+x.level,0)/items.length*10)/10:0;
  document.getElementById('totalNum').textContent=items.length;
  document.getElementById('dueNum').textContent=due;
  document.getElementById('doneNum').textContent=done;
  document.getElementById('avgLevel').textContent=avg;
}

function go(i){
  currentPage=Math.max(0,Math.min(3,i));
  document.getElementById('pages').style.transform=`translateX(-${currentPage*25}%)`;
  document.querySelectorAll('.nav button').forEach((b,idx)=>b.classList.toggle('active',idx===currentPage));
  if(currentPage===0)renderToday();
  if(currentPage===2)renderAll();
  if(currentPage===3)renderStats();
}

document.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-startX;
  const dy=e.changedTouches[0].clientY-startY;
  if(Math.abs(dx)<55||Math.abs(dx)<Math.abs(dy))return;
  if(dx<0)go(currentPage+1);else go(currentPage-1);
},{passive:true});

function escapeHtml(str){return String(str).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}

renderToday();renderAll();renderStats();
  function exportData(){
  const data = JSON.stringify(items, null, 2);
  const blob = new Blob([data], {type:"application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "review_master_backup.json";
  a.click();

  URL.revokeObjectURL(url);
}

function importData(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);

      if(!Array.isArray(data)){
        alert("読み込みできないデータです");
        return;
      }

      if(!confirm("現在のデータを上書きして読み込みますか？")) return;

      items = data;
      save();

      renderToday();
      renderAll();
      renderStats();

      alert("読み込み完了しました");
    }catch(error){
      alert("ファイルの読み込みに失敗しました");
    }
  };

  reader.readAsText(file);
}
</script>
</body>
</html>
